services:
  - type: web
    name: cinemax
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: DATA_DIR
        value: /var/data/cinemax/data
      - key: UPLOADS_DIR
        value: /var/data/cinemax/uploads
    disk:
      name: cinemax-storage
      mountPath: /var/data/cinemax
      sizeGB: 10
